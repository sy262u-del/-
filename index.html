<!DOCTYPE html><html lang="ja"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>okiaim - VALORANT 置きエイム練習</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght=700&family=Teko:wght=500;700&family=Barlow+Condensed:ital,wght=0,600;0,800;1,900&family=Noto+Sans+JP:wght=500;800&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05070a;
            font-family: 'Barlow Condensed', 'Noto Sans JP', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🎮 16:9比率を維持するコンテナ */
        #game-container {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* 16:9 */
            max-width: 100%;
            max-height: 100vh;
            background-image: url('background.png'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            overflow: hidden;
            cursor: default;
        }
        
        @media (min-aspect-ratio: 16/9) {
            #game-container {
                width: 177.78vh;
                height: 100vh;
            }
        }

        #game-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(16,21,25,0) 50%, rgba(16,21,25,0.8) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* 🎮 ゲームプレイ中だけ非表示にするクラス */
        #game-container.ingame-cursor { cursor: none !important; }
        /* 🛠️ メニューやUIボタン上ではプレイ中でもカーソルを戻す */
        #game-container.ingame-cursor #left-ui-container,
        #game-container.ingame-cursor #leaderboard,
        #game-container.ingame-cursor .overlay-screen {
            cursor: default !important;
        }

        /* 🎯 クロスヘア */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 6px; height: 6px;
            background-color: #00ffcc; 
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 8px #00ffcc;
        }

        #weapon-skin {
            position: absolute;
            bottom: 0; right: 0;
            width: 100%; height: 100%;
            background-image: url('1.png');
            background-size: cover;
            background-position: center;
            pointer-events: none;
            z-index: 8; 
        }

        /* 🚶 敵のサイズ */
        .enemy {
            position: absolute;
            height: 24%;          
            aspect-ratio: 1 / 2;  
            background-image: url('enemy.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
            z-index: 5;
            pointer-events: none;
        }

        #wall-left, #wall-right {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('wall_left.png');
            background-size: cover; 
            background-position: center;
            pointer-events: none;
            z-index: 6;
        }
        #wall-right { transform: scaleX(-1); }

        /* 📋 インゲームUI */
        #left-ui-container {
            position: absolute;
            top: 12px; left: 12px;
            z-index: 15;
            display: none; 
            flex-direction: row; 
            align-items: center;
            gap: 10px;
        }

        #mini-skin-selector {
            background: rgba(20, 27, 33, 0.85);
            border: 1px solid rgba(236, 232, 225, 0.15);
            border-radius: 6px;
            padding: 4px 8px;
            display: flex; gap: 6px;
            backdrop-filter: blur(8px);
        }
        .skin-mini-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(236, 232, 225, 0.2);
            color: #8f9aa6;
            padding: 3px 8px;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }
        .skin-mini-btn.active { background: #d1b87d; color: #101519; border-color: #d1b87d; }

        #score-board {
            color: #ece8e1;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(180deg, rgba(20, 27, 33, 0.9) 0%, rgba(14, 19, 23, 0.7) 100%);
            border: 1px solid rgba(236, 232, 225, 0.12);
            border-radius: 8px;
            padding: 4px 14px;
            backdrop-filter: blur(8px);
        }
        .streak-main-box { display: flex; align-items: center; gap: 4px; }
        .board-label { font-size: 0.6rem; color: #8f9aa6; font-weight: 700; font-family: 'Syncopate', sans-serif; }
        #current-streak { color: #dc3d4b; font-size: 2rem; font-family: 'Teko', sans-serif; font-weight: 700; line-height: 1; }
        .best-box { font-size: 0.75rem; color: #ece8e1; white-space: nowrap; }
        #best-streak { color: #d1b87d; font-weight: 700; } 
        #ace-counter { font-size: 0.7rem; color: #d1b87d; font-weight: 600; white-space: nowrap; }
        
        #leaderboard {
            position: absolute;
            top: 12px; right: 12px;
            color: #ece8e1;
            z-index: 15;
            background: rgba(14, 19, 23, 0.85);
            border: 1px solid rgba(236, 232, 225, 0.1);
            border-radius: 8px;
            padding: 4px 10px;
            min-width: 120px;
            backdrop-filter: blur(8px);
            font-size: 0.7rem;
        }
        #leaderboard h3 { font-family: 'Syncopate', sans-serif; font-size: 0.55rem; color: #d1b87d; margin-bottom: 2px; text-align: center; }
        #leaderboard-list { list-style: none; }
        #leaderboard-list li { display: flex; justify-content: space-between; padding: 1px 0; }

        #online-counter-box { margin-top: 2px; font-size: 0.6rem; color: #28a745; text-align: center; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 3px; }
        #online-pulse { width: 4px; height: 4px; background-color: #28a745; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.6; } }

        .v-btn-mini {
            padding: 3px 8px; font-size: 0.65rem; font-weight: 700;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(236, 232, 225, 0.15); color: #8f9aa6; border-radius: 4px; cursor: pointer; white-space: nowrap;
        }
        .v-btn-mini:hover { background: #dc3d4b; color: #ece8e1; }

        @keyframes miss-flash { 0% { box-shadow: inset 0 0 40px rgba(220, 61, 75, 0.4); } 100% { box-shadow: inset 0 0px 0px rgba(220, 61, 75, 0); } }
        .miss-effect { animation: miss-flash 0.3s ease-out; }

        /* メインメニュー */
        .overlay-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(20, 27, 33, 0.94) 0%, rgba(11, 14, 17, 0.98) 100%);
            backdrop-filter: blur(12px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; color: #ece8e1;
            padding: 8px;
        }
        
        h1 { 
            font-size: 2.4rem; color: #ece8e1; font-family: 'Syncopate', sans-serif; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 2px;
            background: linear-gradient(180deg, #ffffff 0%, #bcbfb6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        p { font-size: 0.65rem; margin-bottom: 8px; color: #8f9aa6; letter-spacing: 2px; text-align: center; }
        
        .name-input {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(236,232,225,0.15);
            padding: 5px 10px; color: #ece8e1; font-size: 0.8rem; border-radius: 4px; text-align: center; margin-bottom: 8px; outline: none; width: 200px;
        }
        .name-input:focus { border-color: #dc3d4b; }

        .mode-btn-container { display: flex; gap: 8px; margin-bottom: 8px; }
        .mode-select-btn {
            padding: 5px 12px; font-size: 0.7rem; font-weight: 800; letter-spacing: 1px; border-radius: 4px; cursor: pointer; width: 70px; text-align: center;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(236, 232, 225, 0.15); color: #8f9aa6;
        }
        .mode-select-btn.active[data-mode="easy"] { background: #28a745; color: #fff; border-color: #28a745; }
        .mode-select-btn.active[data-mode="hard"] { background: #dc3d4b; color: #fff; border-color: #dc3d4b; }
        .mode-select-btn.active[data-mode="custom"] { background: #007bff; color: #fff; border-color: #007bff; }

        /* 🎛️ カスタムパネル */
        #custom-panel {
            display: none; flex-direction: column; gap: 6px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(236, 232, 225, 0.1); border-radius: 8px; 
            padding: 8px 12px; width: 280px; margin-bottom: 8px;
        }
        .slider-box { display: flex; flex-direction: column; gap: 2px; width: 100%; }
        .slider-label-row { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.55rem; color: #8f9aa6; font-family: 'Syncopate', sans-serif; letter-spacing: 0.5px;
            white-space: nowrap; 
        }
        .slider-label-row span.val { font-family: 'Teko'; font-size: 0.9rem; color: #ece8e1; }
        .custom-slider { -webkit-appearance: none; width: 100%; height: 3px; background: rgba(236, 232, 225, 0.1); border-radius: 2px; outline: none; margin-top: 2px; }
        .custom-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: #dc3d4b; cursor: pointer; }
        #custom-panel .custom-slider::-webkit-slider-thumb { background: #007bff; }

        .v-btn { 
            padding: 8px 20px; font-size: 0.8rem; background: linear-gradient(90deg, #dc3d4b 0%, #b82e3a 100%); 
            color: #ece8e1; border: none; border-radius: 20px; cursor: pointer; font-weight: 800; letter-spacing: 1px; width: 240px; text-align: center;
        }
        .v-btn:hover { background: #ece8e1; color: #101519; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="left-ui-container">
            <div id="mini-skin-selector">
                <button class="skin-mini-btn active" data-skin="1.png">PRIME</button>
                <button class="skin-mini-btn" data-skin="2.png">RGX</button>
            </div>
            
            <div id="score-board">
                <div class="streak-main-box">
                    <div class="board-label">STREAK</div>
                    <span id="current-streak">0</span>
                </div>
                <span id="ace-counter">0/5 PERFECT</span>
                <div class="best-box">
                    <span>RECORD:</span> <span id="best-streak">0</span>
                </div>
                <button id="ingame-menu-btn" class="v-btn-mini">MENU</button>
            </div>
        </div>

        <div id="leaderboard">
            <h3>ONLINE TOP 5</h3>
            <ul id="leaderboard-list">Loading...</ul>
            <div id="online-counter-box"><span id="online-pulse"></span>ONLINE: <span id="online-count">1</span></div>
        </div>

        <div id="main-menu" class="overlay-screen">
            <h1>okiaim</h1>
            <p>REFLEX TRAINING SYSTEM // CROSSHAIR PLACEMENT</p>
            
            <input type="text" id="player-name" class="name-input" placeholder="PLAYER NAME" maxlength="12" value="AGENT">
            
            <div class="mode-btn-container">
                <button class="mode-select-btn active" data-mode="easy">EASY</button>
                <button class="mode-select-btn" data-mode="hard">HARD</button>
                <button class="mode-select-btn" data-mode="custom">CUSTOM</button>
            </div>

            <div id="custom-panel">
                <div class="slider-box">
                    <div class="slider-label-row">
                        <span>ENEMY SPEED (秒数)</span>
                        <span id="speed-val" class="val">6.0s</span>
                    </div>
                    <input type="range" id="slider-speed" class="custom-slider" min="10" max="90" value="60">
                </div>
                <div class="slider-box">
                    <div class="slider-label-row">
                        <span>SPAWN RATE (出現頻度)</span>
                        <span id="spawn-val" class="val">1.5s</span>
                    </div>
                    <input type="range" id="slider-spawn" class="custom-slider" min="3" max="30" value="15">
                </div>
            </div>

            <button id="to-game-btn" class="v-btn">ENTER SYSTEM</button>

            <div class="slider-box" style="background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(236, 232, 225, 0.05); border-radius: 6px; padding: 6px 12px; width: 240px; margin-top: 6px;">
                <div class="slider-label-row">
                    <span>VOLUME</span>
                    <span id="volume-value" class="val">50%</span>
                </div>
                <input type="range" id="volume-range" class="custom-slider" min="0" max="100" value="50">
            </div>
        </div>

        <div id="crosshair"></div>
        <div id="wall-left"></div>
        <div id="wall-right"></div>
        <div id="weapon-skin"></div>
    </div>

    <audio id="sound-shoot" src="shoot.mp3" preload="auto"></audio>
    <audio id="reva-kill-1" src="reva_kill1.mp3" preload="auto"></audio>
    <audio id="reva-kill-2" src="reva_kill2.mp3" preload="auto"></audio>
    <audio id="reva-kill-3" src="reva_kill3.mp3" preload="auto"></audio>
    <audio id="reva-kill-4" src="reva_kill4.mp3" preload="auto"></audio>
    <audio id="reva-kill-5" src="reva_kill5.mp3" preload="auto"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, setDoc, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDAsC9Bvyok1L1x3TIGqIISp05oc5eERs",
            authDomain: "okiaim.firebaseapp.com",
            projectId: "okiaim",
            storageBucket: "okiaim.firebasestorage.app",
            messagingSenderId: "1016180577259",
            appId: "1:1016180577259:web:3db5e8013ebc30bb4ebfae"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.uploadScore = async function(name, score, mode) {
            if (score <= 0) return;
            try {
                await addDoc(collection(db, "scores"), {
                    name: name || "UNKNOWN",
                    score: parseInt(score),
                    mode: mode,
                    timestamp: new Date()
                });
            } catch (e) { console.error(e); }
        };

        const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(5));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = "";
            if (snapshot.empty) { list.innerHTML = "<li>No Record</li>"; return; }
            snapshot.forEach((doc) => {
                const data = doc.data();
                let modeLabel = " [E]";
                if(data.mode === "hard") modeLabel = " [H]";
                if(data.mode === "custom") modeLabel = " [C]";
                list.innerHTML += `<li><span>${data.name}${modeLabel}</span><strong>${data.score}</strong></li>`;
            });
        }, (err) => { document.getElementById('leaderboard-list').innerHTML = "<li>Offline</li>"; });

        const uniqueId = Math.random().toString(36).substring(2, 15);
        const userPresenceRef = doc(db, "presence", uniqueId);

        async function updatePresence() { try { await setDoc(userPresenceRef, { lastActive: serverTimestamp() }); } catch(e) {} }
        updatePresence();
        const presenceInterval = setInterval(updatePresence, 20000);
        window.addEventListener('beforeunload', () => { clearInterval(presenceInterval); deleteDoc(userPresenceRef); });

        onSnapshot(collection(db, "presence"), (snapshot) => {
            const now = Date.now();
            let activeCount = 0;
            snapshot.forEach((doc) => {
                const data = doc.data();
                if (data.lastActive) {
                    const lastActiveTime = data.lastActive.toDate ? data.lastActive.toDate().getTime() : now;
                    if (now - lastActiveTime < 60000) activeCount++;
                } else { activeCount++; }
            });
            document.getElementById('online-count').textContent = activeCount || 1;
        });
    </script>

    <script>
        const gameContainer = document.getElementById('game-container');
        const weaponSkin = document.getElementById('weapon-skin');
        const mainMenu = document.getElementById('main-menu');
        const leftUiContainer = document.getElementById('left-ui-container');
        const customPanel = document.getElementById('custom-panel');
        
        const currentStreakTxt = document.getElementById('current-streak');
        const bestStreakTxt = document.getElementById('best-streak');
        const aceCounterTxt = document.getElementById('ace-counter');
        
        const toGameBtn = document.getElementById('to-game-btn');
        const ingameMenuBtn = document.getElementById('ingame-menu-btn');

        const volumeRange = document.getElementById('volume-range');
        const volumeValue = document.getElementById('volume-value');
        const playerNameInput = document.getElementById('player-name');

        const sliderSpeed = document.getElementById('slider-speed');
        const sliderSpawn = document.getElementById('slider-spawn');
        const speedValTxt = document.getElementById('speed-val');
        const spawnValTxt = document.getElementById('spawn-val');
        
        const soundShoot = document.getElementById('sound-shoot');
        const revaKillSounds = [
            document.getElementById('reva-kill-1'), document.getElementById('reva-kill-2'),
            document.getElementById('reva-kill-3'), document.getElementById('reva-kill-4'),
            document.getElementById('reva-kill-5')
        ];

        let isGameRunning = false;
        let spawnTimeout = null;
        let selectedMode = 'easy'; 
        
        let streak = 0;
        let bestStreak = 0;

        let currentEnemySpeed = 6.0;
        let currentSpawnInterval = 1500;

        // 🛠️ HARDモードの設定。ランダム化するためspawnIntervalは初期値（目安）として記述
        const modeSettings = {
            easy: { spawnInterval: 2200, speed: 6.0, maxEnemies: 1 }, 
            hard: { spawnInterval: 700,  speed: 6.0, maxEnemies: 12 }, 
            custom: { spawnInterval: 1500, speed: 6.0, maxEnemies: 5 }
        };

        const modeBtns = document.querySelectorAll('.mode-select-btn');
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                modeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedMode = btn.getAttribute('data-mode');
                customPanel.style.display = selectedMode === 'custom' ? 'flex' : 'none';
            });
        });

        sliderSpeed.addEventListener('input', () => { speedValTxt.textContent = `${(sliderSpeed.value / 10).toFixed(1)}s`; });
        sliderSpawn.addEventListener('input', () => { spawnValTxt.textContent = `${(sliderSpawn.value / 10).toFixed(1)}s`; });

        const skinMiniBtns = document.querySelectorAll('.skin-mini-btn');
        skinMiniBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                skinMiniBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                weaponSkin.style.backgroundImage = `url('${btn.getAttribute('data-skin')}')`;
            });
        });

        toGameBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            mainMenu.style.display = 'none';
            leftUiContainer.style.display = 'flex';
            gameContainer.classList.add('ingame-cursor');

            if (selectedMode === 'custom') {
                currentEnemySpeed = parseFloat((sliderSpeed.value / 10).toFixed(1));
                currentSpawnInterval = parseInt(sliderSpawn.value * 100);
            } else {
                currentEnemySpeed = modeSettings[selectedMode].speed;
                currentSpawnInterval = modeSettings[selectedMode].spawnInterval;
            }

            isGameRunning = true;
            resetGame();
        });

        ingameMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            endGameAndSubmit();
        });

        function updateVolume() {
            const volume = volumeRange.value / 100;
            volumeValue.textContent = `${volumeRange.value}%`;
            soundShoot.volume = volume;
            revaKillSounds.forEach(sound => { if (sound) sound.volume = volume; });
        }
        volumeRange.addEventListener('input', updateVolume);
        updateVolume();

        function resetGame() {
            streak = 0; bestStreak = 0; 
            bestStreakTxt.textContent = bestStreak;
            currentStreakTxt.textContent = streak;
            updateAceCounter();
            scheduleNextSpawn();
        }

        function endGameAndSubmit() {
            isGameRunning = false;
            if (spawnTimeout) clearTimeout(spawnTimeout);
            document.querySelectorAll('.enemy').forEach(el => el.remove());
            if (typeof window.uploadScore === 'function' && bestStreak > 0) window.uploadScore(playerNameInput.value, bestStreak, selectedMode);
            
            gameContainer.classList.remove('ingame-cursor');
            leftUiContainer.style.display = 'none';
            mainMenu.style.display = 'flex';
        }

        gameContainer.addEventListener('mousedown', (e) => {
            if (mainMenu.style.display !== 'none' || !isGameRunning) return;

            soundShoot.currentTime = 0;
            soundShoot.play().catch(err => console.log(err));

            const containerRect = gameContainer.getBoundingClientRect();
            const crosshairX = containerRect.left + (containerRect.width / 2);

            const enemies = document.querySelectorAll('.enemy');
            let hitDetected = false;

            for (let enemy of enemies) {
                const enemyRect = enemy.getBoundingClientRect();
                
                if (enemyRect.right <= containerRect.left || enemyRect.left >= containerRect.right) continue;

                const enemyWidth = enemyRect.right - enemyRect.left;
                const enemyCenterX = enemyRect.left + (enemyWidth / 2);
                const headHitboxRadius = enemyWidth * 0.175; 

                if (crosshairX >= (enemyCenterX - headHitboxRadius) && crosshairX <= (enemyCenterX + headHitboxRadius)) {
                    enemy.remove();
                    hitDetected = true;
                    break;
                }
            }

            if (hitDetected) {
                streak++;
                currentStreakTxt.textContent = streak;
                if (streak > bestStreak) {
                    bestStreak = streak;
                    bestStreakTxt.textContent = bestStreak;
                }
                updateAceCounter();
                playKillSound();
            } else {
                handleMiss();
            }
        });

        function updateAceCounter() {
            const killProgress = streak >= 5 ? 5 : streak;
            aceCounterTxt.textContent = `${killProgress}/5 PERFECT`;
        }

        function playKillSound() {
            let soundIndex = streak - 1;
            if (soundIndex >= 4) soundIndex = 4;
            const targetSound = revaKillSounds[soundIndex];
            if (targetSound) { targetSound.currentTime = 0; targetSound.play().catch(err => console.log(err)); }
        }

        // 🛠️ 次の湧き時間をコントロールするメイン関数
        function scheduleNextSpawn() {
            if (!isGameRunning) return;
            const settings = modeSettings[selectedMode];
            
            const currentCount = document.querySelectorAll('.enemy').length;
            if (currentCount < settings.maxEnemies) { 
                spawnEnemyRandomly(); 
            }
            
            // 🛠️ HARDモードのときだけ、0.6秒(600ms) 〜 0.9秒(900ms) の間でランダムなインターバルを生成
            let nextDelay = currentSpawnInterval;
            if (selectedMode === 'hard') {
                nextDelay = Math.floor(Math.random() * (900 - 600 + 1)) + 600;
            }
            
            spawnTimeout = setTimeout(scheduleNextSpawn, nextDelay); 
        }

        function spawnEnemyRandomly() {
            const enemyEl = document.createElement('div');
            enemyEl.classList.add('enemy');
            
            enemyEl.style.top = '50.8%';
            enemyEl.style.transform = 'translateY(-50%)';

            const fromLeft = Math.random() > 0.5;
            enemyEl.style.left = fromLeft ? '-15%' : '110%';
            enemyEl.style.transition = `left ${currentEnemySpeed}s linear`;
            
            gameContainer.appendChild(enemyEl);

            setTimeout(() => { if (enemyEl.parentNode) { enemyEl.style.left = fromLeft ? '110%' : '-15%'; } }, 50);

            setTimeout(() => {
                if (enemyEl.parentNode) {
                    enemyEl.remove();
                    handleMiss();
                }
            }, (currentEnemySpeed * 1000) + 50);
        }

        function handleMiss() {
            if (streak === 0) return;
            if (typeof window.uploadScore === 'function' && bestStreak > 0) window.uploadScore(playerNameInput.value, bestStreak, selectedMode);
            
            streak = 0;
            currentStreakTxt.textContent = streak;
            updateAceCounter();

            gameContainer.classList.remove('miss-effect');
            void gameContainer.offsetWidth; 
            gameContainer.classList.add('miss-effect');
        }
    </script>
</body>
</html>
